# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "a6ac69ec33ef3bd63db0fec6e865bfe9"
name = "pro-validation"
application_url = "https://example.com"
embedded = true

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = "write_products,write_validations,read_checkouts,read_orders,write_delivery_customizations,read_delivery_customizations,write_payment_customizations,read_payment_customizations,read_shipping"

[auth]
redirect_urls = [ "https://example.com/api/auth" ]

[webhooks]
api_version = "2026-10"

[[webhooks.subscriptions]]
topics = [ "checkouts/create", "checkouts/update" ]
uri = "/api/webhooks"

[[webhooks.subscriptions]]
topics = [ "orders/create" ]
uri = "/api/webhooks"

[[webhooks.subscriptions]]
topics = [ "app/uninstalled" ]
uri = "/api/webhooks"

[build]
include_config_on_deploy = true
automatically_update_urls_on_dev = true
